<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Aspectos do Sambaqui do Rio Branco</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    font-family: Arial, sans-serif;
}

#map {
    width: 100%;
    height: 100%;
    background: #e6e6e6;
}

/* Popup inferior esquerdo */
#descricao-projeto {
    position: absolute;
    bottom: 20px;
    left: 20px;
    z-index: 2000;

    width: 320px;

    background: rgba(255,255,255,0.95);
    border: 1px solid #999;
    border-radius: 8px;

    padding: 15px;

    box-shadow: 0 3px 10px rgba(0,0,0,0.3);

    font-size: 13px;
    line-height: 1.5;
}

#fechar-popup {
    float: right;
    border: none;
    background: transparent;
    font-size: 18px;
    cursor: pointer;
}

.botao-tabela {
    margin-top: 10px;
    padding: 8px 12px;

    background: #0056b3;
    color: white;

    border: none;
    border-radius: 4px;

    cursor: pointer;
}

.botao-tabela:hover {
    background: #003d80;
}
</style>
</head>

<body>

<div id="descricao-projeto">

    <button id="fechar-popup"
            onclick="document.getElementById('descricao-projeto').style.display='none'">
        ×
    </button>

    <strong>Discente:</strong> Isadora Martins Vidotti<br>
    <strong>Disciplina:</strong> SIG II<br>
    <strong>Docente:</strong> Catherine Torres de Almeida<br>
    <strong>Curso:</strong> Graduação em Geografia<br>
    <strong>Instituição:</strong> UFPR

    <hr>

    <button class="botao-tabela"
            onclick="window.open('tabela.html','_blank')">
        Ver Tabela de Dados
    </button>

</div>

<!-- Seu mapa QGIS2Web -->
<div id="map">

    <!-- Cole aqui os elementos do seu mapa exportado -->

        <div id="popup-content"></div>
    </div>
    -->

</div>

</body>
</html>
