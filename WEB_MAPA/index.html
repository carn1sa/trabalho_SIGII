<script>

function fecharMetadados(){

    document.getElementById('descricao-projeto').style.display = 'none';

    document.getElementById('abrir-metadados').style.display = 'block';
}

function abrirMetadados(){

    document.getElementById('descricao-projeto').style.display = 'block';

    document.getElementById('abrir-metadados').style.display = 'none';
}

function atualizarDescricao(nomeCamada){

    const texto = document.getElementById('texto-camada');

    switch(nomeCamada){

        case 'Uso do Solo':

            texto.innerHTML = `
                <strong>Camada:</strong> Uso do Solo
                <br><br>

                <strong>Resumo</strong><br>
                Uso do solo vetorizado obtido a partir de imagens Sentinel-2.
                <br><br>

                <strong>Categoria</strong><br>
                Mapas Base de Imagens de Cobertura da Terra.
                <br><br>

                <strong>Responsável</strong><br>
                Isadora Martins Vidotti – UFPR.
            `;
            break;


        case 'Suscetibilidade Erosiva':

            texto.innerHTML = `
                <strong>Camada:</strong> Suscetibilidade Erosiva
                <br><br>

                <strong>Resumo</strong><br>
                Dado gerado a partir da metodologia proposta por Amaro et al. (2021).
                <br><br>

                <strong>Categoria</strong><br>
                Informação Geocientífica.
                <br><br>

                <strong>Sistema de Referência</strong><br>
                SIRGAS 2000 / UTM Zona 22S (EPSG:31982).
                <br><br>

                <strong>Responsável</strong><br>
                Isadora Martins Vidotti – UFPR.
            `;
            break;


        case 'Outros Sítios Arqueológicos do Paraná':

            texto.innerHTML = `
                <strong>Camada:</strong> Sítios Arqueológicos do Paraná
                <br><br>

                <strong>Resumo</strong><br>
                Sítios arqueológicos localizados no estado do Paraná, representados por dados vetoriais poligonais.
                <br><br>

                <strong>Tema</strong><br>
                Arqueologia.
                <br><br>

                <strong>Categoria</strong><br>
                Informação Geocientífica.
                <br><br>

                <strong>Fonte</strong><br>
                Instituto do Patrimônio Histórico e Artístico Nacional (IPHAN).
                <br><br>

                <strong>Direitos</strong><br>
                Dados disponibilizados pelo Banco de Dados do Patrimônio Arqueológico do IPHAN.
                <br><br>

                <strong>Sistema de Referência</strong><br>
                SIRGAS 2000 (EPSG:4674).
            `;
            break;


        default:

            texto.innerHTML = `
                Selecione uma camada no painel lateral para visualizar seus metadados.
            `;
    }
}

window.onload = function(){
    atualizarDescricao('Suscetibilidade Erosiva');
};

</script>
