<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <link rel="stylesheet" href="./resources/ol.css">
    <link rel="stylesheet" href="resources/fontawesome-all.min.css">
    <link href="resources/photon-geocoder-autocomplete.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./resources/ol-layerswitcher.css">
    <link rel="stylesheet" href="./resources/qgis2web.css">

    <style>
        html, body {
            background-color: #ffffff;
        }

        html, body, #map {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
        }

        .ol-control > * {
            background-color: #ffffff !important;
            color: #443c44 !important;
            border-radius: 0px;
        }

        .ol-attribution a,
        .gcd-gl-input::placeholder,
        .search-layer-input-search::placeholder {
            color: #443c44 !important;
        }

        .search-layer-input-search {
            background-color: #ffffff !important;
        }

        .ol-control > *:focus,
        .ol-control > *:hover {
            background-color: rgba(255,255,255,0.7) !important;
        }

        .ol-control {
            background-color: rgba(255,255,255,.4) !important;
            padding: 2px !important;
        }

        /* Popup informativo */
        #descricao-projeto {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 2000;

            width: 320px;
            padding: 15px;

            background: rgba(255,255,255,0.95);
            border: 1px solid #999;
            border-radius: 8px;

            box-shadow: 0 3px 10px rgba(0,0,0,0.3);

            font-family: Arial, Helvetica, sans-serif;
            font-size: 13px;
            line-height: 1.5;
            color: #333;
        }

        #descricao-projeto h3 {
            margin: 0 0 10px 0;
            font-size: 15px;
            color: #222;
        }

        #fechar-popup {
            float: right;
            border: none;
            background: transparent;
            font-size: 18px;
            cursor: pointer;
            color: #666;
            font-weight: bold;
        }

        #fechar-popup:hover {
            color: #000;
        }
    </style>

    <title>Aspectos do Sambaqui do Rio Branco</title>
</head>

<body>

    <!-- Popup de descrição -->
    <div id="descricao-projeto">
        <button id="fechar-popup"
                onclick="document.getElementById('descricao-projeto').style.display='none'">
            ×
        </button>

        <h3>Aspectos do Sambaqui do Rio Branco</h3>

        <strong>Discente:</strong> Isadora Martins Vidotti<br>
        <strong>Disciplina:</strong> SIG II<br>
        <strong>Docente:</strong> Catherine Torres de Almeida<br>
        <strong>Curso:</strong> Graduação em Geografia<br>
        <strong>Instituição:</strong> UFPR
    </div>

    <!-- Mapa -->
    <div id="map">
        <div id="popup" class="ol-popup">
            <a href="#" id="popup-closer" class="ol-popup-closer"></a>
            <div id="popup-content"></div>
        </div>
    </div>

    <!-- Scripts do QGIS2Web -->
    <script src="resources/qgis2web_expressions.js"></script>
    <script src="./resources/functions.js"></script>
    <script src="./resources/ol.js"></script>
    <script src="./resources/ol-layerswitcher.js"></script>
    <script src="resources/photon-geocoder-autocomplete.min.js"></script>
    <script src="resources/olms.js"></script>

    <script src="layers/MapadeSolosdoParanEMBRAPA_1.js"></script>
    <script src="layers/UsodoSolo_6.js"></script>
    <script src="layers/OutrosStiosArqueolgicosdoParan_7.js"></script>
    <script src="layers/PontosAmostrais_8.js"></script>

    <script src="styles/MapadeSolosdoParanEMBRAPA_1_style.js"></script>
    <script src="styles/UsodoSolo_6_style.js"></script>
    <script src="styles/OutrosStiosArqueolgicosdoParan_7_style.js"></script>
    <script src="styles/PontosAmostrais_8_style.js"></script>

    <script src="./layers/layers.js"></script>
    <script src="./resources/Autolinker.min.js"></script>
    <script src="./resources/qgis2web.js"></script>

</body>
</html>
