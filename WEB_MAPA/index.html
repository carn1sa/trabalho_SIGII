<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <title>Aspectos do Sambaqui do Rio Branco</title>

    <!-- Estilos -->
    <link rel="stylesheet" href="./resources/ol.css">
    <link rel="stylesheet" href="resources/fontawesome-all.min.css">
    <link rel="stylesheet" href="resources/photon-geocoder-autocomplete.min.css">
    <link rel="stylesheet" href="./resources/ol-layerswitcher.css">
    <link rel="stylesheet" href="./resources/qgis2web.css">

    <style>
        html, body {
            background-color: #ffffff;
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
        }
        #map {
            width: 100%;
            height: 100%;
        }
        .ol-control > * {
            background-color: #ffffff!important;
            color: #443c44!important;
            border-radius: 0px;
        }
        .ol-attribution a, .gcd-gl-input::placeholder, .search-layer-input-search::placeholder {
            color: #443c44!important;
        }
        .search-layer-input-search {
            background-color: #ffffff!important;
        }
        .ol-control > *:focus, .ol-control >*:hover {
            background-color: rgba(255, 255, 255, 0.7)!important;
        } 
        .ol-control {
            background-color: rgba(255,255,255,.4) !important;
            padding: 2px !important;
        } 
    </style>
</head>
    
<body>

<div id="map">
    <div id="popup" class="ol-popup">
        <a href="#" id="popup-closer" class="ol-popup-closer"></a>
        <div id="popup-content"></div>
    </div>
</div>

<!-- PAINEL DE METADADOS -->
<div id="descricao-projeto">
    <button class="fechar-btn" onclick="fecharMetadados()">×</button>
    <h3>Metadados</h3>
    <strong>Aspectos do Sambaqui do Rio Branco</strong><br><br>
    Discente: Isadora Martins Vidotti<br>
    Disciplina: SIG II<br>
    Docente: Catherine Torres de Almeida<br>
    Curso: Graduação em Geografia<br>
    Instituição: UFPR
    <hr>
    <div id="texto-camada">
        Selecione uma camada para visualizar seus metadados.
    </div>
    <br>
    <button onclick="mostrarTabelaMetadados()">Ver tabela completa</button>
    <div id="tabela-metadados"></div>
</div>

<div id="abrir-metadados" onclick="abrirMetadados()">Metadados</div>

<!-- Scripts -->
<script src="resources/qgis2web_expressions.js"></script>
<script src="./resources/functions.js"></script>
<script src="./resources/ol.js"></script>
<script src="./resources/ol-layerswitcher.js"></script>
<script src="resources/photon-geocoder-autocomplete.min.js"></script>
<script src="resources/olms.js"></script>

<script src="layers/MapadeSolosdoParanEMBRAPA_1.js"></script>
<script src="layers/UsodoSolo_6.js"></script>
<script src="layers/OutrosStiosArqueolgicosdoParan_7.js"></script>
<script src="layers/PontosAmostrais_8.js"></script>

<script src="styles/MapadeSolosdoParanEMBRAPA_1_style.js"></script>
<script src="styles/UsodoSolo_6_style.js"></script>
<script src="styles/OutrosStiosArqueolgicosdoParan_7_style.js"></script>
<script src="styles/PontosAmostrais_8_style.js"></script>

<script src="./layers/layers.js"></script>
<script src="./resources/Autolinker.min.js"></script>
<script src="./resources/qgis2web.js"></script>

<style>
#descricao-projeto{
    position:absolute;
    bottom:20px;
    right:20px;
    z-index:9999;
    width:380px;
    max-height:500px;
    overflow-y:auto;
    padding:15px;
    background:rgba(255,255,255,.95);
    border:1px solid #999;
    border-radius:8px;
    box-shadow:0 2px 10px rgba(0,0,0,.3);
    font-family:Arial,sans-serif;
    font-size:13px;
    line-height:1.5;
}
.fechar-btn{
    float:right;
    border:none;
    background:none;
    font-size:18px;
    cursor:pointer;
}
#abrir-metadados{
    position:absolute;
    bottom:20px;
    right:20px;
    z-index:9999;
    background:white;
    border:1px solid #999;
    border-radius:6px;
    padding:8px 12px;
    cursor:pointer;
    display:none;
    box-shadow:0 2px 10px rgba(0,0,0,.3);
}
#tabela-metadados{
    display:none;
    margin-top:10px;
    max-height:250px;
    overflow:auto;
}
#tabela-metadados table{
    width:100%;
    border-collapse:collapse;
    font-size:11px;
}
#tabela-metadados th,
#tabela-metadados td{
    border:1px solid #ccc;
    padding:4px;
    text-align:left;
}
#tabela-metadados th{
    background:#f0f0f0;
}
</style>

<script>
function fecharMetadados(){
    document.getElementById('descricao-projeto').style.display='none';
    document.getElementById('abrir-metadados').style.display='block';
}
function abrirMetadados(){
    document.getElementById('descricao-projeto').style.display='block';
    document.getElementById('abrir-metadados').style.display='none';
}
function mostrarTabelaMetadados(){
    const div = document.getElementById('tabela-metadados');
    if(div.style.display === 'block'){
        div.style.display = 'none';
        return;
    }
    fetch('metadados_qmd.csv')
    .then(response => response.text())
    .then(csv => {
        const linhas = csv.trim().split('\n');
        let html = '<table>';
        linhas.forEach((linha,index)=>{
            html += '<tr>';
            linha.split(',').forEach(coluna=>{
                if(index === 0){
                    html += `<th>${coluna}</th>`;
                } else {
                    html += `<td>${coluna}</td>`;
                }
            });
            html += '</tr>';
        });
        html += '</table>';
        div.innerHTML = html;
        div.style.display = 'block';
    })
    .catch(error => {
        div.innerHTML = 'Erro ao carregar metadados_qmd.csv';
        div.style.display = 'block';
    });
}
</script>

</body>
</html>
