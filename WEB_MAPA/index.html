    </button>

    <h3 id="titulo-camada">
        Aspectos do Sambaqui do Rio Branco
    </h3>

    <div id="texto-camada">
        Selecione uma camada para visualizar sua descrição.
    </div>

</div>

<script>

function atualizarDescricao(nomeCamada){

    const titulo = document.getElementById('titulo-camada');
    const texto = document.getElementById('texto-camada');

    switch(nomeCamada){

        case 'Uso do Solo':

            titulo.innerHTML = 'Uso do Solo';

            texto.innerHTML = `
                <strong>Resumo</strong><br>
                Uso do solo vetorizado obtido a partir de imagens do satélite Sentinel-2.
                <br><br>

                <strong>Categoria</strong><br>
                Mapas Base de Imagens de Cobertura da Terra.
                <br><br>

                <strong>Responsável</strong><br>
                Isadora Martins Vidotti – UFPR.
            `;
            break;


        case 'Suscetibilidade Erosiva':

            titulo.innerHTML = 'Suscetibilidade Erosiva';

            texto.innerHTML = `
                <strong>Resumo</strong><br>
                Dado gerado a partir da metodologia proposta por Amaro et al. (2021).
                <br><br>

                <strong>Categoria</strong><br>
                Informação Geocientífica.
                <br><br>

                <strong>Sistema de Referência</strong><br>
                SIRGAS 2000 / UTM Zona 22S (EPSG:31982).
                <br><br>

                <strong>Responsável</strong><br>
                Isadora Martins Vidotti – UFPR.
            `;
            break;


        case 'Outros Sítios Arqueológicos do Paraná':

            titulo.innerHTML = 'Sítios Arqueológicos do Paraná';

            texto.innerHTML = `
                <strong>Resumo</strong><br>
                Sítios arqueológicos localizados no estado do Paraná,
                representados por dados vetoriais em formato poligonal.
                <br><br>

                <strong>Tema</strong><br>
                Arqueologia.
                <br><br>

                <strong>Categoria</strong><br>
                Informação Geocientífica.
                <br><br>

                <strong>Fonte</strong><br>
                Instituto do Patrimônio Histórico e Artístico Nacional (IPHAN).
                <br><br>

                <strong>Direitos</strong><br>
                Dados disponibilizados pelo Banco de Dados do Patrimônio Arqueológico do IPHAN.
                <br><br>

                <strong>Sistema de Referência</strong><br>
                SIRGAS 2000 (EPSG:4674).
            `;
            break;


        default:

            titulo.innerHTML = 'Aspectos do Sambaqui do Rio Branco';

            texto.innerHTML = `
                Selecione uma camada no painel lateral para visualizar sua descrição.
            `;
    }
}

</script>
