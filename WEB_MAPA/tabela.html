<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Tabela de Dados</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin: 30px;
}

h1{
    color:#333;
}

table{
    width:100%;
    border-collapse: collapse;
}

th, td{
    border:1px solid #ccc;
    padding:10px;
    text-align:center;
}

th{
    background:#f2f2f2;
}

tr:nth-child(even){
    background:#fafafa;
}
</style>
</head>

<body>

<h1>Tabela de Dados</h1>

<table>
    <thead>
        <tr>
            <th>Ponto</th>
            <th>Coordenada X</th>
            <th>Coordenada Y</th>
            <th>Descrição</th>
        </tr>
    </thead>

    <tbody>
        <tr>
            <td>P1</td>
            <td>450123</td>
            <td>7189456</td>
            <td>Material cerâmico</td>
        </tr>

        <tr>
            <td>P2</td>
            <td>450258</td>
            <td>7189510</td>
            <td>Vestígio lítico</td>
        </tr>

        <tr>
            <td>P3</td>
            <td>450376</td>
            <td>7189602</td>
            <td>Área de escavação</td>
        </tr>
    </tbody>
</table>

</body>
</html>
